<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factures</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#c026d3" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Bousso" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <p class="bonjour">Répertoire des factures</p>
    <h1 class="titre">Mes Factures</h1>
  </div>

  <!-- LISTE FACTURES -->
  <div class="section">
    <p class="section-titre">Toutes les factures</p>
    <div id="liste-factures">
      <p class="vide">Aucune facture générée</p>
    </div>
  </div>

  <!-- MODAL APERCU -->
  <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:flex-end;">
    <div style="background:white; width:100%; max-width:420px; border-radius:20px 20px 0 0; padding:20px; max-height:85vh; overflow-y:auto;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h3 style="font-size:16px; font-weight:600; color:#111;">Aperçu facture</h3>
        <button onclick="fermerModal()" style="background:none; border:none; font-size:22px; cursor:pointer; color:#999;">✕</button>
      </div>

      <div class="facture-apercu">
        <div class="facture-entete">
          <h2>Parfums by Bousso</h2>
          <p id="modal-numero"></p>
          <p id="modal-date"></p>
        </div>
        <p class="facture-client-nom" id="modal-client"></p>
        <table class="facture-table">
          <thead>
            <tr>
              <th>Produit</th>
              <th>Qté</th>
              <th>Prix</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="modal-lignes"></tbody>
        </table>
        <div class="facture-total">
          <span>Total</span>
          <span id="modal-total">0 F CFA</span>
        </div>
      </div>

      <button class="btn-pdf" onclick="telechargerDepuisModal()">📄 Télécharger PDF</button>
      <button class="btn-reset" onclick="fermerModal()">Fermer</button>
    </div>
  </div>

  <!-- NAV BAS -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span>🏠</span>
      <span>Accueil</span>
    </a>
    <a href="produits.html" class="nav-item">
      <span>📦</span>
      <span>Produits</span>
    </a>
    <a href="ventes.html" class="nav-item">
      <span>🛒</span>
      <span>Ventes</span>
    </a>
    <a href="factures.html" class="nav-item active">
      <span>🧾</span>
      <span>Factures</span>
    </a>
  </nav>

  <script src="js/app.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
      .then(() => console.log('Service Worker enregistré ✅'))
      .catch(err => console.log('Erreur SW:', err));
  }
</script>
</body>
</html>

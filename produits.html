<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produits</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <p class="bonjour">Gestion du stock</p>
    <h1 class="titre">Mes Produits</h1>
  </div>

  <!-- FORMULAIRE AJOUT -->
  <div class="section">
    <p class="section-titre">Ajouter un produit</p>
    <div class="formulaire">
      <input type="text" id="nom-produit" placeholder="Nom du parfum" />
      <input type="number" id="prix-produit" placeholder="Prix (F CFA)" />
      <input type="number" id="stock-produit" placeholder="Quantité en stock" />
      <button onclick="ajouterProduit()">Ajouter le produit</button>
    </div>
  </div>

  <!-- LISTE PRODUITS -->
  <div class="section">
    <p class="section-titre">Catalogue</p>
    <div id="liste-produits">
      <p class="vide">Aucun produit ajouté</p>
    </div>
  </div>

  <!-- NAV BAS -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span>🏠</span>
      <span>Accueil</span>
    </a>
    <a href="produits.html" class="nav-item active">
      <span>📦</span>
      <span>Produits</span>
    </a>
    <a href="ventes.html" class="nav-item">
      <span>🛒</span>
      <span>Ventes</span>
    </a>
    <a href="factures.html" class="nav-item">
      <span>🧾</span>
      <span>Factures</span>
    </a>
  </nav>

  <script src="js/app.js"></script>
</body>
</html>

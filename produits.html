<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produits</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#c026d3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bousso" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <p class="bonjour">Gestion du stock</p>
    <h1 class="titre">Mes Produits</h1>
  </div>

  <!-- FORMULAIRE AJOUT -->
  <div class="section">
    <p class="section-titre">Ajouter un produit</p>
    <div class="formulaire">
      <input type="text" id="nom-produit" placeholder="Nom du parfum" />
      <input type="number" id="prix-produit" placeholder="Prix (F CFA)" />
      <input type="number" id="stock-produit" placeholder="Quantité en stock" />

      <!-- PHOTO -->
      <div class="photo-upload-zone" onclick="document.getElementById('photo-input').click()">
        <div id="photo-preview-zone">
          <span style="font-size:28px;">📷</span>
          <p style="font-size:13px; color:#999; margin-top:4px;">Ajouter une photo</p>
        </div>
        <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none;" onchange="previewPhoto(event)" />
      </div>

      <button onclick="ajouterProduit()">Ajouter le produit</button>
    </div>
  </div>

  <!-- LISTE PRODUITS -->
  <div class="section">
    <p class="section-titre">Catalogue</p>
    <div id="liste-produits">
      <p class="vide">Aucun produit ajouté</p>
    </div>
  </div>

  <!-- NAV BAS -->
 <nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <span>🏠</span>
    <span>Accueil</span>
  </a>
  <a href="produits.html" class="nav-item">
    <span>📦</span>
    <span>Produits</span>
  </a>
  <a href="ventes.html" class="nav-item">
    <span>🛒</span>
    <span>Ventes</span>
  </a>
  <a href="factures.html" class="nav-item">
    <span>🧾</span>
    <span>Factures</span>
  </a>
  <a href="rapport.html" class="nav-item">
    <span>📊</span>
    <span>Rapport</span>
  </a>
</nav>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(() => console.log('SW enregistré ✅'))
        .catch(err => console.log('Erreur SW:', err));
    }
  </script>
</body>
</html>

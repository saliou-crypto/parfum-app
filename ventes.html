<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ventes</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#c026d3" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Bousso" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<meta name="mobile-web-app-capable" content="yes">
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <p class="bonjour">Enregistrer une vente</p>
    <h1 class="titre">Nouvelle Vente</h1>
  </div>

  <!-- FORMULAIRE -->
  <div class="section">
    <p class="section-titre">Informations client</p>
    <div class="formulaire">
      <input type="text" id="client-vente" placeholder="Nom du client (optionnel)" />
    </div>
  </div>

  <!-- PANIER -->
<div class="section">
  <p class="section-titre">Ajouter des produits</p>
  <div class="formulaire">
    <input type="text" id="recherche-produit" placeholder="🔍 Rechercher un parfum..." oninput="filtrerProduits()" />
    <select id="produit-vente">
      <option value="">-- Choisir un parfum --</option>
    </select>
    <input type="number" id="quantite-vente" placeholder="Quantité" min="1" />
    <button onclick="ajouterAuPanier()">+ Ajouter au panier</button>
  </div>
</div>
  <!-- APERCU PANIER -->
  <div class="section" id="panier-section" style="display:none;">
    <p class="section-titre">Panier</p>
    <div id="panier-liste"></div>
    <div class="total-box" style="margin-top:10px;">
      <span>Total panier</span>
      <span id="total-panier">0 F CFA</span>
    </div>
    <button class="btn-valider" onclick="validerVente()">✅ Valider la vente</button>
    <button class="btn-vider" onclick="viderPanier()">🗑 Vider le panier</button>
  </div>

  <!-- HISTORIQUE -->
  <div class="section">
    <p class="section-titre">Historique</p>
    <div id="historique-ventes">
      <p class="vide">Aucune vente enregistrée</p>
    </div>
  </div>

  <!-- NAV BAS -->
  <nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <span>🏠</span>
    <span>Accueil</span>
  </a>
  <a href="produits.html" class="nav-item">
    <span>📦</span>
    <span>Produits</span>
  </a>
  <a href="ventes.html" class="nav-item">
    <span>🛒</span>
    <span>Ventes</span>
  </a>
  <a href="factures.html" class="nav-item">
    <span>🧾</span>
    <span>Factures</span>
  </a>
  <a href="rapport.html" class="nav-item">
    <span>📊</span>
    <span>Rapport</span>
  </a>
</nav>

  <script src="js/app.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
      .then(() => console.log('Service Worker enregistré ✅'))
      .catch(err => console.log('Erreur SW:', err));
  }
</script>
</body>
</html>
